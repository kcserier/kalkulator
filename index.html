<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kínai Sorsfejtő</title>
    <!-- Stabil, külső motor behívása -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root { --arany: #d4af37; --sotet: #1a1a1a; }
        body { font-family: 'Georgia', serif; background: var(--sotet); color: #f4f4f4; text-align: center; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: #2d2d2d; padding: 25px; border-radius: 15px; border: 1px solid var(--arany); box-shadow: 0 0 20px rgba(212,175,55,0.3); }
        h1 { color: var(--arany); margin-bottom: 5px; }
        input { padding: 12px; border-radius: 5px; margin-bottom: 20px; width: 85%; border: 1px solid var(--arany); background: #333; color: white; }
        button { background: var(--arany); color: black; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px; width: 90%; }
        .grid { display: flex; justify-content: space-around; margin-top: 30px; gap: 8px; display: none; }
        .col { flex: 1; border: 1px solid #555; padding: 10px 2px; border-radius: 8px; background: rgba(0,0,0,0.4); }
        .label { font-size: 11px; color: var(--arany); display: block; margin-bottom: 8px; font-weight: bold; }
        .stem { font-weight: bold; font-size: 15px; padding: 6px; border-radius: 4px; display: block; margin-bottom: 5px; color: white; text-shadow: 1px 1px 2px black; }
        .branch { font-size: 13px; color: #eee; font-weight: bold; }
        /* Színek */
        .fa { background: #27ae60; } .tuz { background: #c0392b; } .fold { background: #b7950b; } .fem { background: #7f8c8d; } .viz { background: #2980b9; }
        .cta { margin-top: 35px; border-top: 1px dotted #666; padding-top: 20px; }
        .email-link { color: var(--arany); text-decoration: none; border: 1px solid var(--arany); padding: 10px 20px; border-radius: 5px; display: inline-block; transition: 0.3s; }
        .email-link:hover { background: var(--arany); color: black; }
    </style>
</head>
<body>

<div class="box">
    <h1>Kínai Sorsfejtő</h1>
    <p style="font-size: 14px; color: #aaa;">Add meg születési dátumod és órád!</p>
    <input type="datetime-local" id="bDate">
    <br>
    <button onclick="calc()">Sorsfejtés Generálása</button>

    <div id="res" class="grid">
        <div class="col"><span class="label">ÓRA</span><div id="hS"></div><div id="hB"></div></div>
        <div class="col"><span class="label">NAP</span><div id="dS"></div><div id="dB"></div></div>
        <div class="col"><span class="label">HÓNAP</span><div id="mS"></div><div id="mB"></div></div>
        <div class="col"><span class="label">ÉV</span><div id="yS"></div><div id="yB"></div></div>
    </div>

    <div class="cta">
        <p>Szeretnél részletes elemzést?</p>
        <a href="mailto:kcserier@gmail.com elemzés érdeklődés" class="email-link">Kapcsolatfelvétel</a>
    </div>
</div>

<script>
const dict = {
    '甲':'Jang Fa','乙':'Jin Fa','丙':'Jang Tűz','丁':'Jin Tűz','戊':'Jang Föld','己':'Jin Föld','庚':'Jang Fém','辛':'Jin Fém','壬':'Jang Víz','癸':'Jin Víz',
    '子':'Patkány','丑':'Bivaly','寅':'Tigris','卯':'Nyúl','辰':'Sárkány','巳':'Kígyó','午':'Ló','未':'Kecske','申':'Majom','酉':'Kakas','戌':'Kutya','亥':'Disznó'
};

const colors = {
    'Jang Fa':'fa','Jin Fa':'fa','Jang Tűz':'tuz','Jin Tűz':'tuz','Jang Föld':'fold','Jin Föld':'fold','Jang Fém':'fem','Jin Fém':'fem','Jang Víz':'viz','Jin Víz':'viz'
};

function set(id, ch, isS) {
    const d = document.getElementById(id);
    const nev = dict[ch] || ch;
    d.innerText = nev;
    if(isS) {
        d.className = 'stem ' + (colors[nev] || '');
    } else {
        d.className = 'branch';
    }
}
</script>
</body>
</html>
