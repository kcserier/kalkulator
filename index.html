<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kínai Sorsfejtő</title>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
        :root { --arany: #d4af37; --sotet: #1a1a1a; }
        body { font-family: 'Georgia', serif; background: var(--sotet); color: #f4f4f4; text-align: center; padding: 20px; }
        .box { max-width: 450px; margin: auto; background: #2d2d2d; padding: 25px; border-radius: 15px; border: 1px solid var(--arany); box-shadow: 0 0 20px rgba(212,175,55,0.3); }
        h1 { color: var(--arany); }
        input { padding: 12px; border-radius: 5px; margin-bottom: 20px; width: 85%; border: 1px solid var(--arany); background: #333; color: white; }
        button { background: var(--arany); color: black; border: none; padding: 15px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 90%; margin-bottom: 20px; }
        .grid { display: none; justify-content: space-around; gap: 5px; margin-top: 20px; }
        .col { flex: 1; border: 1px solid #555; padding: 10px 2px; border-radius: 8px; background: rgba(0,0,0,0.4); }
        .label { font-size: 10px; color: var(--arany); display: block; margin-bottom: 5px; font-weight: bold; }
        .stem { font-weight: bold; font-size: 13px; padding: 5px; border-radius: 4px; display: block; margin-bottom: 5px; color: white; }
        .branch { font-size: 12px; color: #eee; }
        /* Színek */
        .fa { background: #27ae60; } .tuz { background: #c0392b; } .fold { background: #b7950b; } .fem { background: #7f8c8d; } .viz { background: #2980b9; }
        .cta { margin-top: 30px; border-top: 1px solid #444; padding-top: 20px; }
        .email-link { color: var(--arany); text-decoration: none; border: 1px solid var(--arany); padding: 10px 20px; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="box">
    <h1>Kínai Sorsfejtő</h1>
    <input type="datetime-local" id="bDate">
    <button onclick="calc()">Sorsfejtés Generálása</button>

    <div id="res" class="grid">
        <div class="col"><span class="label">ÓRA</span><div id="hS"></div><div id="hB"></div></div>
        <div class="col"><span class="label">NAP</span><div id="dS"></div><div id="dB"></div></div>
        <div class="col"><span class="label">HÓNAP</span><div id="mS"></div><div id="mB"></div></div>
        <div class="col"><span class="label">ÉV</span><div id="yS"></div><div id="yB"></div></div>
    </div>

    <div class="cta">
        <p>Szeretnél részletes elemzést?</p>
        <a href="mailto:kcserier@gmail.com elemzés érdeklődés" class="email-link">Kapcsolatfelvétel</a>
    </div>
</div>

<script>
// Új, leegyszerűsített szótár a hibák elkerülésére
const szotar = {
    '甲':['Jang Fa','fa'], '乙':['Jin Fa','fa'], '丙':['Jang Tűz','tuz'], '丁':['Jin Tűz','tuz'],
    '戊':['Jang Föld','fold'], '己':['Jin Föld','fold'], '庚':['Jang Fém','fem'], '辛':['Jin Fém','fem'],
    '壬':['Jang Víz','viz'], '癸':['Jin Víz','viz'],
    '子':'Patkány', '丑':'Bivaly', '寅':'Tigris', '卯':'Nyúl', '辰':'Sárkány', '巳':'Kígyó', 
    '午':'Ló', '未':'Kecske', '申':'Majom', '酉':'Kakas', '戌':'Kutya', '亥':'Disznó'
};

function calc() {
    try {
        const val = document.getElementById('bDate').value;
        if(!val) return;
        
        const d = new Date(val);
        const l = Solar.fromDate(d).getLunar().getEightChar();
        
        // Adatok beírása
        megjelenit('yS', 'yB', l.getYearGan(), l.getYearZhi());
        megjelenit('mS', 'mB', l.getMonthGan(), l.getMonthZhi());
        megjelenit('dS', 'dB', l.getDayGan(), l.getDayZhi());
        megjelenit('hS', 'hB', l.getHourGan(), l.getHourZhi());
        
        document.getElementById('res').style.display = 'flex';
    } catch(e) { 
        alert("Hiba történt. Frissítsd az oldalt és próbáld újra!");
        console.log(e);
    }
}

function megjelenit(sId, bId, sChar, bChar) {
    const sEl = document.getElementById(sId);
    const bEl = document.getElementById(bId);
    
    const sData = szotar[sChar]; // [Név, Színosztály]
    const bName = szotar[bChar]; // Csak név
    
    sEl.innerText = sData[0];
    sEl.className = 'stem ' + sData[1];
    bEl.innerText = bName || bChar;
}
</script>
</body>
</html>
