<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kínai Sorstérkép</title>
    <!-- Ez a legstabilabb elérési út a motorhoz -->
    <script src="https://unpkg.com"></script>
    <style>
        :root { --arany: #d4af37; --sotet: #1a1a1a; }
        body { font-family: 'Georgia', serif; background: var(--sotet); color: #f4f4f4; text-align: center; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: #2d2d2d; padding: 25px; border-radius: 15px; border: 1px solid var(--arany); }
        h1 { color: var(--arany); }
        input { padding: 10px; border-radius: 5px; margin-bottom: 20px; width: 80%; }
        button { background: var(--arany); color: black; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .grid { display: flex; justify-content: space-around; margin-top: 20px; gap: 5px; display:none; }
        .col { flex: 1; border: 1px solid #444; padding: 10px 2px; border-radius: 5px; background: rgba(0,0,0,0.2); }
        .label { font-size: 10px; color: var(--arany); display: block; margin-bottom: 5px; }
        .stem { font-weight: bold; font-size: 14px; padding: 5px; border-radius: 3px; display: block; margin-bottom: 3px; color: white; }
        .branch { font-size: 12px; color: #ccc; }
        .fa { background: #27ae60; } .tuz { background: #c0392b; } .fold { background: #b7950b; } .fem { background: #7f8c8d; } .viz { background: #2980b9; }
        .cta { margin-top: 30px; border-top: 1px solid #444; padding-top: 15px; }
        a { color: var(--arany); text-decoration: none; border: 1px solid var(--arany); padding: 5px 10px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Kínai Sorstérkép</h1>
    <input type="datetime-local" id="bDate">
    <br>
    <button onclick="calc()">Sorsfejtés</button>

    <div id="res" class="grid">
        <div class="col"><span class="label">ÓRA</span><div id="hS"></div><div id="hB"></div></div>
        <div class="col"><span class="label">NAP</span><div id="dS"></div><div id="dB"></div></div>
        <div class="col"><span class="label">HÓNAP</span><div id="mS"></div><div id="mB"></div></div>
        <div class="col"><span class="label">ÉV</span><div id="yS"></div><div id="yB"></div></div>
    </div>

    <div class="cta">
        <p>Szeretnél mélyebb elemzést?</p>
        <a href="mailto:SajátEmailCímed@gmail.com">Írj nekem e-mailt!</a>
    </div>
</div>

<script>
const dict = {
    '甲':['Jang Fa','fa'],'乙':['Jin Fa','fa'],'丙':['Jang Tűz','tuz'],'丁':['Jin Tűz','tuz'],'戊':['Jang Föld','fold'],'己':['Jin Föld','fold'],'庚':['Jang Fém','fem'],'辛':['Jin Fém','fem'],'壬':['Jang Víz','viz'],'癸':['Jin Víz','viz'],
    '子':'Patkány','丑':'Bivaly','寅':'Tigris','卯':'Nyúl','辰':'Sárkány','巳':'Kígyó','午':'Ló','未':'Kecske','申':'Majom','酉':'Kakas','戌':'Kutya','亥':'Disznó'
};

function set(id, ch, isS) {
    const d = document.getElementById(id);
    if(isS) { d.innerText = dict[ch][0]; d.className = 'stem ' + dict[ch][1]; }
    else { d.innerText = dict[ch] || ch; d.className = 'branch'; }
}

function calc() {
    try {
        const v = document.getElementById('bDate').value;
        if(!v) return;
        // Itt hívjuk meg a Lunar könyvtárat
        const l = Solar.fromDate(new Date(v)).getLunar();
        const b = l.getEightChar();
        
        set('yS', b.getYearGan(), true); set('yB', b.getYearZhi(), false);
        set('mS', b.getMonthGan(), true); set('mB', b.getMonthZhi(), false);
        set('dS', b.getDayGan(), true); set('dB', b.getDayZhi(), false);
        set('hS', b.getHourGan(), true); set('hB', b.getHourZhi(), false);
        
        document.getElementById('res').style.display = 'flex';
    } catch(e) { 
        console.log(e);
        alert("Várj egy pillanatot, amíg a rendszer betölt, majd próbáld újra!"); 
    }
}
</script>
</body>
</html>
