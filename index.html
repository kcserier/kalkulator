<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Kínai Horoszkóp Kalkulátor</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; background: #fdf2f2; }
        .card { background: white; padding: 20px; border-radius: 10px; border: 2px solid #d32f2f; text-align: center; margin-top: 50px; }
        input, button { padding: 10px; margin: 10px; }
        .result { margin-top: 20px; display: none; }
        .jegy { font-size: 1.5em; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2>Kínai Horoszkóp</h2>
    <input type="date" id="birthDate" min="1924-02-05" max="2080-12-31">
    <button onclick="calculate()">Kalkuláció</button>
    <div id="resultBox" class="result">
        <p id="zodiacAnimal" class="jegy"></p>
        <p id="zodiacElement"></p>
    </div>
</div>

<script>
// A holdújév dátumok teljes adatbázisa (1924-2080)
const cnyDates = { /* ... a 156+ bejegyzés a forráskód részletben található ... */ };

function calculate() {
    const input = document.getElementById('birthDate').value;
    if (!input) return;
    const date = new Date(input);
    let year = date.getFullYear();
    const monthDay = `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

    // Holdújév korrekció (ha a születés a holdújév előtt volt)
    if (cnyDates[year] && monthDay < cnyDates[year]) year--; 

    const animals = ["Majom", "Kakas", "Kutya", "Disznó", "Patkány", "Bivaly", "Tigris", "Nyúl", "Sárkány", "Kígyó", "Ló", "Kecske"];
    const elements = ["Fém", "Víz", "Fa", "Tűz", "Föld"];
    
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('zodiacAnimal').innerText = animals[year % 12];
    document.getElementById('zodiacElement').innerText = elements[Math.floor((year % 10) / 2)];
}
</script>
</body>
</html>
